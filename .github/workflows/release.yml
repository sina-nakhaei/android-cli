name: Publish Release

on:
  push:
    tags:
      - 'v*' # Triggers workflow only when you push a tag starting with 'v' (e.g., v1.0.1)

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Crucial permission allowing the runner to create releases

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Crucial: Allows the buildconfig plugin to read your Git tags in CI

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'   # Updated to match your project's toolchain version

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Build the distribution zip using your Gradle task
    - name: Build with Gradle
      run: ./gradlew distZip

    # This step locates and renames the zip to match your specific 'android-vX.X.X.zip' format
    - name: Prepare Release Asset
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        # Locates the zip generated by Gradle distribution plugin
        $generatedZip = Get-ChildItem -Path build/distributions/*.zip | Select-Object -First 1
        
        # Rename it to your custom format: android-vX.X.X.zip
        $newName = "android-$tag.zip"
        Rename-Item -Path $generatedZip.FullName -NewName $newName
        
        # Move it to root for easy access in the next step
        Move-Item -Path "build/distributions/$newName" -Destination "./$newName"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          android-${{ github.ref_name }}.zip
